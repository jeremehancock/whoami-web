<!DOCTYPE html>
<html lang="en" data-theme="default">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>whoami — Jereme Hancock</title>
  <meta name="description" content="An interactive terminal résumé. Type whoami, ls, cd, cat, and man to explore." />
  <meta name="color-scheme" content="dark light" />

  <!-- terminal-prompt favicon -->
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' rx='3' fill='%2311131a'/%3E%3Cpath d='M3 5l3 3-3 3' fill='none' stroke='%239ece6a' stroke-width='1.6' stroke-linecap='round' stroke-linejoin='round'/%3E%3Cpath d='M8.5 11h3.5' stroke='%239ece6a' stroke-width='1.6' stroke-linecap='round'/%3E%3C/svg%3E" />

  <!-- monospace web font, with a graceful system fallback -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <main class="terminal" id="terminal" aria-label="Interactive terminal">
    <div class="titlebar" id="titlebar">
      <div class="dots" aria-hidden="true">
        <span class="dot red"></span><span class="dot yellow"></span><span class="dot green"></span>
      </div>
      <div class="title" id="title-text">guest@whoami: ~</div>
      <div class="titlebar-spacer"></div>
    </div>

    <div class="screen" id="screen">
      <div class="output" id="output" role="log" aria-live="polite"></div>
      <div class="input-line" id="input-line">
        <span class="prompt" id="prompt"></span><span class="cmd"><span id="typed"></span><span class="cursor" id="cursor">&nbsp;</span><span id="rest"></span></span>
      </div>
    </div>
  </main>

  <!-- the real, invisible input: captures keys, paste, and the mobile keyboard -->
  <input id="hidden-input" class="hidden-input" type="text" autocomplete="off"
         autocapitalize="off" autocorrect="off" spellcheck="false"
         aria-label="Terminal command input" />

  <noscript>
    <p style="font-family:monospace;color:#c8d3f5;background:#11131a;padding:1rem">
      This terminal needs JavaScript enabled. (It's all client-side — no tracking, no servers.)
    </p>
  </noscript>

  <script src="assets/js/util.js"></script>
  <script src="assets/js/filesystem.js"></script>
  <script src="assets/js/commands.js"></script>
  <script src="assets/js/terminal.js"></script>
  <script src="assets/js/main.js"></script>
</body>
</html>
