<!DOCTYPE html>
<html lang="en" data-theme="default">
<head>
  <meta charset="utf-8" />
  <!-- Resolve relative asset/content paths correctly no matter how the page is
       reached: /dir/, /dir (no trailing slash), or /dir/index.html. This makes
       the site work when deployed in a subdirectory. Must run before the CSS/JS
       and the content.json fetch below. -->
  <script>
    (function () {
      var url = location.href.split('#')[0].split('?')[0];
      if (url.charAt(url.length - 1) !== '/') {
        var seg = url.slice(url.lastIndexOf('/') + 1);
        // a dot in the last segment means it's a file (index.html) -> use its dir
        url = seg.indexOf('.') === -1 ? url + '/' : url.slice(0, url.lastIndexOf('/') + 1);
      }
      var base = document.createElement('base');
      base.href = url;
      document.head.appendChild(base);
    })();
  </script>
  <!-- interactive-widget=resizes-content: when the on-screen keyboard opens,
       shrink the *layout* viewport (so vh/dvh/% and the document itself get
       smaller) instead of only the visual viewport. Without this, Android
       Chrome keeps the layout viewport full-height and lets you pan the small
       visible area down into the empty space below the keyboard. (Ignored by
       browsers that don't support it, e.g. iOS Safari, which fall back to the
       --vvh tracking in JS.) -->
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=resizes-content" />
  <!-- Generic fallback title; the real one is set from content.json at runtime
       (this shows pre-JS, with JS disabled, or when content.json can't load). -->
  <title>whoami</title>
  <meta name="description" content="An interactive terminal résumé. Type whoami, ls, cd, cat, and man to explore." />
  <meta name="color-scheme" content="dark light" />

  <!-- terminal-prompt favicon -->
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' rx='3' fill='%2311131a'/%3E%3Cpath d='M3 5l3 3-3 3' fill='none' stroke='%239ece6a' stroke-width='1.6' stroke-linecap='round' stroke-linejoin='round'/%3E%3Cpath d='M8.5 11h3.5' stroke='%239ece6a' stroke-width='1.6' stroke-linecap='round'/%3E%3C/svg%3E" />

  <!-- monospace web font, with a graceful system fallback -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <main class="terminal" id="terminal" aria-label="Interactive terminal">
    <div class="titlebar" id="titlebar">
      <span class="tb-spacer" aria-hidden="true"></span>
      <div class="title" id="title-text">guest@whoami: ~</div>
      <div class="winbtns">
        <span class="winbtn min" role="button" aria-label="Minimize"></span><span class="winbtn max" role="button" aria-label="Maximize"></span><span class="winbtn close" role="button" aria-label="Close"></span>
      </div>
    </div>

    <div class="screen" id="screen">
      <div class="output" id="output" role="log" aria-live="polite"></div>
      <div class="input-line" id="input-line"><span class="prompt" id="prompt"></span><span class="cmd"><span id="typed"></span><span class="cursor" id="cursor">&nbsp;</span><span id="rest"></span></span></div>
    </div>

    <!-- touch-only quick-command bar (hidden on desktop); populated by JS -->
    <div class="quickbar" id="quickbar" role="toolbar" aria-label="Quick commands"></div>

    <!-- drag-to-resize handles (desktop only) -->
    <div class="resize-handles" aria-hidden="true">
      <span class="rh n" data-dir="n"></span><span class="rh s" data-dir="s"></span><span class="rh e" data-dir="e"></span><span class="rh w" data-dir="w"></span><span class="rh ne" data-dir="ne"></span><span class="rh nw" data-dir="nw"></span><span class="rh se" data-dir="se"></span><span class="rh sw" data-dir="sw"></span>
    </div>
  </main>

  <!-- Blank-screen boot console. The BIOS/POST scroll plays here, full-screen
       with no window chrome, on power-on and `reboot` — then it fades to reveal
       the terminal window (see Terminal.boot). Hidden in the markup so no-JS
       visitors just get the terminal, not a black screen. -->
  <div class="bootscreen" id="bootscreen" aria-hidden="true" hidden></div>
  <script>
    // Power on right away: reveal the boot console the instant it's parsed —
    // before first paint and before the deferred app scripts load — so the page
    // opens straight onto the blank boot screen instead of flashing the empty
    // terminal first. boot() runs the POST animation from here. (Reduced-motion
    // visitors skip the boot screen; CSS keeps it hidden for them.)
    document.getElementById('bootscreen').hidden = false;
  </script>

  <!-- shown after the window is "closed" (desktop only) -->
  <button id="restart-terminal" class="restart-btn" hidden>&gt; restart terminal</button>

  <!-- the real, invisible input: captures keys, paste, and the mobile keyboard.
       The data-*ignore attrs + tabindex tell password managers (Bitwarden,
       1Password, LastPass, Dashlane, Proton Pass) to leave this field alone —
       it's not a login field, just a keystroke sink. -->
  <input id="hidden-input" class="hidden-input" type="text" tabindex="-1"
         autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false"
         aria-label="Terminal command input"
         data-1p-ignore data-lpignore="true" data-bwignore="true"
         data-form-type="other" data-protonpass-ignore="true" />

  <noscript>
    <p style="font-family:monospace;color:#c8d3f5;background:#11131a;padding:1rem">
      This terminal needs JavaScript enabled. (It's all client-side — no tracking, no servers.)
    </p>
  </noscript>

  <script src="assets/js/util.js"></script>
  <script src="assets/js/filesystem.js"></script>
  <script src="assets/js/figlet.js"></script>
  <script src="assets/js/commands.js"></script>
  <script src="assets/js/terminal.js"></script>
  <script src="assets/js/window.js"></script>
  <script src="assets/js/tui.js"></script>
  <script src="assets/js/main.js"></script>
</body>
</html>
